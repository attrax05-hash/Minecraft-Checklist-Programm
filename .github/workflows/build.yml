name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: Minecraft-Checklist-*.AppImage
            asset_name: minecraft-checklist-linux
          - os: windows-latest
            artifact_name: Minecraft-Checklist-*.exe
            asset_name: minecraft-checklist-windows
          - os: macos-latest
            artifact_name: Minecraft-Checklist-*.dmg
            asset_name: minecraft-checklist-macos

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm run build:electron

      - name: Build and package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: pnpm run dist:linux

      - name: Build and package (Windows)
        if: matrix.os == 'windows-latest'
        run: pnpm run dist:win

      - name: Build and package (macOS)
        if: matrix.os == 'macos-latest'
        run: pnpm run dist:mac

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: release/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
