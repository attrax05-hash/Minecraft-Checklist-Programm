name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
     matrix:
        os: [windows-latest]

    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Build Vite
        run: npm run build
      
      - name: Build TypeScript
        run: npx tsc electron/main.ts electron/preload.ts --outDir dist/electron --module esnext --target es2020 --moduleResolution node
      
      - name: Build with electron-builder
        run: npx electron-builder --publish never

      
      - name: Upload artifacts to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/**/*.exe
            release/**/*.dmg
            release/**/*.AppImage
            release/**/*.deb
            release/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
